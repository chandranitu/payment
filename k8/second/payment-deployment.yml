apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: payment:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8088
        env:
        - name: MONGO_HOST
          value: mongo-service
        - name: MONGO_PORT
          value: "27017"
        - name: MONGO_DB
          value: test
        - name: MONGO_USER
          value: testUser
        - name: MONGO_PASSWORD
          value: testUser
